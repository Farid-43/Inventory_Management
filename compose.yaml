services:
  postgres:
    image: "postgres:16-alpine"
    environment:
      - "POSTGRES_DB=${POSTGRES_DB:-inventory}"
      - "POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}"
      - "POSTGRES_USER=${POSTGRES_USER:-postgres}"
    ports:
      - "5432:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-inventory}",
        ]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    ports:
      - "8081:8081"
    environment:
      - DB_URL=${DB_URL:-jdbc:postgresql://postgres:5432/inventory}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - PORT=${PORT:-8081}
      - SPRING_DOCKER_COMPOSE_ENABLED=false
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
