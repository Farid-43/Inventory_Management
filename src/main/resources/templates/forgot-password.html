<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | Inventory Console</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="auth-screen">
<div class="orb orb-left"></div>
<div class="orb orb-right"></div>
<main class="auth-card reveal">
    <p class="eyebrow">Account Recovery</p>
    <h1 class="headline">Forgot your password?</h1>
    <p class="subhead">Enter your username or email and we will process a password reset request.</p>

    <div th:if="${param.error}" class="notice error">Please enter username or email.</div>

    <form th:action="@{/forgot-password}" method="post" class="auth-form">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <label for="emailOrUsername">Username or Email</label>
        <input id="emailOrUsername" name="emailOrUsername" type="text" required>

        <button type="submit" class="btn btn-primary">Send Request</button>
    </form>

    <p class="helper">Remembered your password? <a th:href="@{/login}">Back to login</a></p>
</main>
</body>
</html>
