<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | Inventory Console</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="auth-screen">
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<main class="auth-card fade-in">
    <div class="brand-mark">🔑</div>
    <p class="eyebrow">Account Recovery</p>
    <h1 class="headline">Reset your password</h1>
    <p class="subtext">Enter your username or email and we will process a password reset request.</p>

    <div th:if="${param.error}" class="alert alert-error">Please enter a valid username or email.</div>

    <form th:action="@{/forgot-password}" method="post" class="form-stack">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <div class="form-group">
            <label for="emailOrUsername">Username or Email</label>
            <input id="emailOrUsername" name="emailOrUsername" type="text" placeholder="Enter username or email" required>
        </div>
        <button type="submit" class="btn btn-primary btn-full">Send Request</button>
    </form>

    <div class="auth-links">
        <span>Remember your password?</span>
        <a th:href="@{/login}">Back to login</a>
    </div>
</main>
</body>
</html>
