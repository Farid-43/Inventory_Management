<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | Inventory Console</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="auth-screen">
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<main class="auth-card fade-in">
    <div class="brand-mark">📦</div>
    <p class="eyebrow">Inventory Management</p>
    <h1 class="headline">Welcome back</h1>
    <p class="subtext">Sign in to your account to manage products, orders, and stock.</p>

    <div th:if="${param.error}" class="alert alert-error">Invalid username or password.</div>
    <div th:if="${param.logout}" class="alert alert-success">You have been logged out successfully.</div>
    <div th:if="${param.registered}" class="alert alert-success">Account created! Please sign in.</div>
    <div th:if="${param.resetRequested}" class="alert alert-success">Reset request received. Contact admin for credentials.</div>

    <form th:action="@{/login}" method="post" class="form-stack">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <div class="form-group">
            <label for="username">Username</label>
            <input id="username" name="username" type="text" placeholder="Enter your username" required autofocus>
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input id="password" name="password" type="password" placeholder="Enter your password" required>
        </div>
        <button type="submit" class="btn btn-primary btn-full">Sign In</button>
    </form>

    <div class="auth-links">
        <a th:href="@{/forgot-password}">Forgot password?</a>
        <span class="divider">·</span>
        <a th:href="@{/register}">Create account</a>
    </div>
</main>
</body>
</html>
