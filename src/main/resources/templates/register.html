<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Inventory Console</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="auth-screen">
<div class="orb orb-left"></div>
<div class="orb orb-right"></div>
<main class="auth-card reveal">
    <p class="eyebrow">Get Started</p>
    <h1 class="headline">Create your account</h1>
    <p class="subhead">Start tracking inventory with role-based access controls.</p>

    <form th:action="@{/register}" method="post" class="auth-form" id="register-form">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <label for="username">Username</label>
        <input id="username" name="username" type="text" minlength="3" required>

        <label for="email">Email</label>
        <input id="email" name="email" type="email" required>

        <label for="password">Password</label>
        <input id="password" name="password" type="password" minlength="6" required>

        <button type="submit" class="btn btn-primary">Register</button>
    </form>

    <p class="helper">Already registered? <a th:href="@{/login}">Go to login</a></p>
</main>
<script th:src="@{/js/register.js}"></script>
</body>
</html>
