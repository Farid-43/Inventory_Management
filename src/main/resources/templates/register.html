<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register | Inventory Console</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" th:href="@{/css/app.css}" />
  </head>
  <body class="auth-screen">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <main class="auth-card fade-in">
      <div class="brand-mark">📦</div>
      <p class="eyebrow">Get Started</p>
      <h1 class="headline">Create your account</h1>
      <p class="subtext">
        Start tracking inventory with role-based access controls and choose
        account type.
      </p>

      <div
        th:if="${param.error}"
        class="alert alert-error"
        th:text="${param.error[0]}"
      >
        Error occurred.
      </div>

      <form
        th:action="@{/register}"
        method="post"
        class="form-stack"
        id="register-form"
      >
        <input
          type="hidden"
          th:name="${_csrf.parameterName}"
          th:value="${_csrf.token}"
        />
        <div class="form-group">
          <label for="username">Username</label>
          <input
            id="username"
            name="username"
            type="text"
            placeholder="Choose a username"
            minlength="3"
            required
          />
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input
            id="email"
            name="email"
            type="email"
            placeholder="you@example.com"
            required
          />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input
            id="password"
            name="password"
            type="password"
            placeholder="Min 6 characters"
            minlength="6"
            required
          />
        </div>
        <div class="form-group">
          <label for="role">Account Type</label>
          <select id="role" name="role" required>
            <option value="BUYER" selected>
              Buyer (browse and order products)
            </option>
            <option value="SELLER">
              Seller (manage products and monitor orders)
            </option>
          </select>
        </div>
        <button type="submit" class="btn btn-primary btn-full">
          Create Account
        </button>
      </form>

      <div class="auth-links">
        <span>Already have an account?</span>
        <a th:href="@{/login}">Sign in</a>
      </div>
    </main>
    <script th:src="@{/js/register.js}"></script>
  </body>
</html>
